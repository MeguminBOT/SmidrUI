name: API docs

# Builds the dox API site and publishes it to GitHub Pages.
# One-time setup: repo Settings > Pages > Source = "GitHub Actions".

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Install haxelibs
        run: |
          haxelib install hxcpp --quiet
          haxelib install lime --quiet
          haxelib install openfl --quiet
          haxelib install flixel --quiet
          haxelib install hscript --quiet
          haxelib install dox --quiet

      - name: Generate type XML
        run: haxe doc.hxml

      - name: Build API reference (dox)
        run: haxelib run dox -i doc/xml -o doc/site/api -in smidr --title "SmiðrUI API"

      - name: Apply smidr Dark theme + nav
        run: bash doc/apply-theme.sh

      - name: Assemble the hand-authored pages
        run: |
          cp doc/pages/index.html doc/site/index.html
          python3 doc/build-widget-guide.py doc/site/widgets.html

      - name: Build web examples (HTML5)
        run: |
          for ex in calculator gallery small full; do
            haxelib run lime build "examples/$ex/project.xml" html5 -release
          done

      - name: Assemble examples into the site
        run: |
          mkdir -p doc/site/examples
          cp doc/examples/index.html doc/site/examples/index.html
          for ex in calculator gallery small full; do
            mkdir -p "doc/site/examples/$ex"
            cp -r "examples/$ex/bin/html5/bin/." "doc/site/examples/$ex/"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
